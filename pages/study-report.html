<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学情报告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f7fa; min-height: 100vh; }
    
    .container { min-height: 100vh; padding-bottom: 40px; padding-top: 44px; width: 100%; }
    
    /* 顶部导航栏 */
    .nav-bar { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 15px; background: #fff; border-bottom: 1px solid #eee; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .nav-back { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .back-icon { font-size: 18px; color: #333; }
    .nav-title { font-size: 16px; font-weight: 600; color: #333; }
    .nav-right { width: 30px; }
    
    /* 视频信息卡片 */
    .video-info-card { display: flex; align-items: center; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 12px; border-radius: 8px; }
    .video-thumb { width: 60px; height: 40px; border-radius: 4px; background-color: rgba(255,255,255,0.3); }
    .video-detail { margin-left: 10px; flex: 1; }
    .video-title { display: block; font-size: 14px; color: #fff; font-weight: 500; }
    .video-meta { display: block; font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    
    /* 总体评价 */
    .overall-section { margin: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; padding: 15px; box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3); }
    .overall-header { display: flex; align-items: center; margin-bottom: 10px; }
    .overall-score-box { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.2); border-radius: 8px; padding: 8px 12px; margin-right: 10px; }
    .score-num { font-size: 28px; font-weight: 700; color: #fff; line-height: 1; }
    .score-label { font-size: 11px; color: rgba(255,255,255,0.9); margin-top: 3px; }
    .overall-title { display: flex; align-items: center; }
    .title-icon { font-size: 18px; margin-right: 6px; }
    .title-text { font-size: 16px; font-weight: 600; color: #fff; }
    .overall-content { background: rgba(255,255,255,0.15); border-radius: 6px; padding: 10px; }
    .overall-text { font-size: 13px; color: #fff; line-height: 1.8; }
    
    /* 统计卡片 */
    .stats-grid { display: flex; justify-content: center; padding: 0 12px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
    .stat-card { flex: 1; background: #fff; border-radius: 8px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin: 0 6px; }
    .stat-card:first-child { margin-left: 0; }
    .stat-card:last-child { margin-right: 0; }
    .stat-card.weak { background: #fff2f0; }
    .stat-icon { font-size: 18px; margin-bottom: 6px; }
    .stat-info { display: flex; flex-direction: column; align-items: center; }
    .stat-count { font-size: 18px; font-weight: 700; color: #333; line-height: 1; }
    .stat-card.weak .stat-count { color: #ff4d4f; }
    .stat-label { font-size: 11px; color: #999; margin-top: 3px; }
    
    /* 通用区块 */
    .section { padding: 0 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
    .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; padding-left: 8px; border-left: 3px solid #667eea; }
    
    /* 操作按钮 */
    .action-buttons { display: flex; gap: 12px; padding: 0 12px; margin: 20px 0; width: 100%; box-sizing: border-box; }
    .btn-regenerate, .btn-back-video { flex: 1; height: 44px; line-height: 44px; border-radius: 22px; font-size: 14px; padding: 0; margin: 0; border: none; cursor: pointer; }
    .btn-regenerate { background: #fff; color: #667eea; border: 1px solid #667eea; }
    .btn-back-video { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    
    /* 加载状态 */
    .loading-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .loading-mask.hidden { display: none; }
    .loading-content { background: #fff; border-radius: 8px; padding: 20px 30px; display: flex; flex-direction: column; align-items: center; }
    .loading-spinner { width: 30px; height: 30px; border: 2px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部导航栏 -->
    <div class="nav-bar">
      <div class="nav-back" id="backBtn">
        <span class="back-icon">←</span>
      </div>
      <span class="nav-title">学情报告</span>
      <div class="nav-right"></div>
    </div>

    <!-- 视频信息卡片 -->
    <div class="video-info-card">
      <div class="video-thumb" id="videoThumb"></div>
      <div class="video-detail">
        <span class="video-title" id="videoTitle">当前视频</span>
        <span class="video-meta" id="videoMeta">0分钟 | 学习完成</span>
      </div>
    </div>

    <!-- 总体评价 -->
    <div class="overall-section">
      <div class="overall-header">
        <div class="overall-score-box">
          <span class="score-num" id="overallScore">0</span>
          <span class="score-label">综合得分</span>
        </div>
        <div class="overall-title">
          <span class="title-icon">📊</span>
          <span class="title-text">总体评价</span>
        </div>
      </div>
      <div class="overall-content">
        <span class="overall-text" id="overallSummary">整体掌握良好，建议针对薄弱环节进行强化练习</span>
      </div>
    </div>

    <!-- 三个统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">📚</span>
        <div class="stat-info">
          <span class="stat-count" id="knowledgeCount">0</span>
          <span class="stat-label">知识点</span>
        </div>
      </div>
      <div class="stat-card weak">
        <span class="stat-icon">💪</span>
        <div class="stat-info">
          <span class="stat-count" id="weakPointsCount">0</span>
          <span class="stat-label">薄弱点</span>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🎯</span>
        <div class="stat-info">
          <span class="stat-count" id="recommendedSegmentsCount">0</span>
          <span class="stat-label">推荐片段</span>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-buttons">
      <button class="btn-regenerate" id="regenerateBtn">🔄 重新生成报告</button>
      <button class="btn-back-video" id="backVideoBtn">📹 返回继续学习</button>
    </div>

    <!-- 加载状态 -->
    <div class="loading-mask hidden" id="loadingMask">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <span class="loading-text" id="loadingText">正在生成报告...</span>
      </div>
    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script>
    // 页面状态
    const state = {
      videoId: null,
      videoTitle: '当前视频',
      videoDuration: 0,
      reportData: null,
      knowledgeItems: [],
      weakPoints: [],
      isLoading: true
    };

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      
      state.videoId = params.get('videoId') || params.get('video_id');
      state.videoTitle = params.get('videoTitle') ? decodeURIComponent(params.get('videoTitle')) : '当前视频';
      state.videoDuration = params.get('duration') || 0;
      
      document.getElementById('videoTitle').textContent = state.videoTitle;
      document.getElementById('videoMeta').textContent = state.videoDuration + '分钟 | 学习完成';
      
      // 绑定事件
      bindEvents();
      
      // 加载学情报告
      loadStudyReport();
    });

    // 绑定事件
    function bindEvents() {
      document.getElementById('backBtn').addEventListener('click', goBack);
      document.getElementById('regenerateBtn').addEventListener('click', regenerateReport);
      document.getElementById('backVideoBtn').addEventListener('click', backToVideo);
    }

    // ========== API 请求 ==========
    const API_BASE = 'https://knowpals.xyz';
    
    function getToken() {
      return localStorage.getItem('token');
    }
    
    async function fetchWithAuth(url, options = {}) {
      const token = getToken();
      const res = await fetch(API_BASE + url, {
        ...options,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          ...options.headers
        }
      });
      
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
        return null;
      }
      
      return res.json();
    }

    // 加载学情报告
    async function loadStudyReport() {
      // 如果没有videoId，尝试从存储中获取
      if (!state.videoId) {
        console.log('>>> 无videoId，加载模拟数据');
        loadMockData();
        return;
      }

      console.log('>>> loadStudyReport 被调用');
      console.log('>>> videoId:', state.videoId);
      console.log('>>> 先尝试获取已存储的报告: GET /api/v1/agent/report?video_id=' + state.videoId);
      
      showLoading('正在加载学情报告...');

      try {
        // 先尝试获取已存储的报告
        const res = await fetchWithAuth('/api/v1/agent/report?video_id=' + state.videoId);
        console.log('>>> getReport 返回:', JSON.stringify(res, null, 2));
        
        if (res.code === 200 && res.data) {
          console.log('>>> 获取到已存储的报告');
          processReportData(res.data);
        } else {
          console.log('>>> 没有已存储的报告，尝试生成新的');
          // 如果没有存储的报告，尝试生成新的
          await generateNewReport();
        }
      } catch (error) {
        console.error('>>> 获取报告失败:', error);
        // 使用 Mock 数据
        loadMockData();
      } finally {
        hideLoading();
      }
    }

    // 生成新的学情报告
    async function generateNewReport() {
      console.log('>>> generateNewReport 被调用');
      console.log('>>> videoId:', state.videoId);
      console.log('>>> 接口: POST /api/v1/agent/report');
      
      showLoading('正在生成学情报告...');

      try {
        const res = await fetchWithAuth('/api/v1/agent/report', {
          method: 'POST',
          body: JSON.stringify({
            video_id: state.videoId,
            force_regen: false
          })
        });
        
        console.log('>>> 生成学情报告返回:', JSON.stringify(res, null, 2));
        
        if (res.code === 200 && res.data) {
          console.log('>>> 成功生成学情报告');
          processReportData(res.data);
        } else {
          console.warn('>>> 生成报告失败: code=', res.code, 'msg=', res.msg);
          alert(res.msg || '生成报告失败');
          loadMockData();
        }
      } catch (error) {
        console.error('>>> 生成报告失败:', error);
        loadMockData();
      } finally {
        hideLoading();
      }
    }

    // 处理报告数据
    function processReportData(data) {
      state.reportData = data;
      
      // 计算总体得分
      let totalMastery = 0;
      let itemCount = 0;
      let totalSegments = 0;
      
      state.knowledgeItems = (data.items || []).map(item => {
        totalMastery += item.mastery || 0;
        itemCount++;
        totalSegments += (item.recommended_segments || []).length;
        return {
          ...item,
          title: item.knowledge_id
        };
      });

      const overallScore = itemCount > 0 ? Math.round(totalMastery / itemCount) : 85;

      // 筛选薄弱点
      state.weakPoints = state.knowledgeItems.filter(item => (item.mastery || 0) < 70);

      // 更新UI
      document.getElementById('overallScore').textContent = overallScore;
      document.getElementById('overallSummary').textContent = data.overall_summary || '整体掌握良好，建议针对薄弱环节进行强化练习';
      document.getElementById('knowledgeCount').textContent = state.knowledgeItems.length;
      document.getElementById('weakPointsCount').textContent = state.weakPoints.length;
      document.getElementById('recommendedSegmentsCount').textContent = totalSegments;
    }

    // Mock 数据
    function loadMockData() {
      const mockData = {
        overallScore: 78,
        overallSummary: '整体掌握良好，但在勾股定理应用方面还需加强练习。建议重点复习勾股定理的实际应用场景。',
        items: [
          {
            knowledge_id: 'k1',
            title: '勾股定理定义',
            mastery: 92,
            trend: '掌握稳定',
            summary: '对勾股定理的基本定义理解准确',
            weakness: [],
            recommended_segments: []
          },
          {
            knowledge_id: 'k2',
            title: '勾股定理证明',
            mastery: 85,
            trend: '略有提升',
            summary: '能够理解并复述常见证明方法',
            weakness: [],
            recommended_segments: []
          },
          {
            knowledge_id: 'k3',
            title: '勾股定理应用',
            mastery: 58,
            trend: '需要加强',
            summary: '在实际问题中应用勾股定理存在困难',
            weakness: ['复杂图形分析', '多步骤计算'],
            recommended_segments: [
              { segment_id: 's1', video_id: 1, start_ms: 120000, end_ms: 180000 },
              { segment_id: 's2', video_id: 1, start_ms: 300000, end_ms: 400000 }
            ]
          }
        ]
      };

      processReportData(mockData);
    }

    // 重新生成报告
    function regenerateReport() {
      if (!state.videoId) {
        alert('视频信息不完整');
        return;
      }

      if (!confirm('确定要重新生成学情报告吗？')) {
        return;
      }

      showLoading('正在重新生成报告...');

      API.agent.generateReport({ video_id: state.videoId, force_regen: true })
        .then(function(res) {
          hideLoading();
          if (res.code === 200 && res.data) {
            processReportData(res.data);
            alert('报告已更新');
          } else {
            alert(res.msg || '生成失败');
          }
        })
        .catch(function(err) {
          console.error('>>> 重新生成报告失败:', err);
          hideLoading();
          alert('生成失败，请重试');
        });
    }

    // 返回视频继续学习
    function backToVideo() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '../video-play/video-play.html?videoId=' + state.videoId;
      }
    }

    // 跳转到指定学习片段
    function jumpToSegment(knowledgeIndex, segmentIndex) {
      const item = state.knowledgeItems[knowledgeIndex];
      const segment = item.recommended_segments[segmentIndex];
      
      if (!segment) return;

      const videoId = segment.video_id || state.videoId;
      const startTime = Math.floor(segment.start_ms / 1000);

      // 如果有历史页面，返回并跳转
      if (window.history.length > 1) {
        window.history.back();
        // 延迟跳转
        setTimeout(function() {
          window.location.href = '../video-play/video-play.html?videoId=' + videoId + '&startTime=' + startTime;
        }, 100);
      } else {
        window.location.href = '../video-play/video-play.html?videoId=' + videoId + '&startTime=' + startTime;
      }
    }

    // 开始练习
    function startPractice(index) {
      const item = state.weakPoints[index];
      if (!item) return;

      window.location.href = '../quiz-practice/quiz-practice.html?videoId=' + state.videoId + '&knowledgeId=' + item.knowledge_id + '&title=' + encodeURIComponent(item.title || '薄弱点练习');
    }

    // 返回上一页
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '../index/index.html';
      }
    }

    // 格式化时间（毫秒转分:秒）
    function formatTime(ms) {
      if (!ms) return '0:00';
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    }

    // 显示加载状态
    function showLoading(text) {
      document.getElementById('loadingText').textContent = text;
      document.getElementById('loadingMask').classList.remove('hidden');
    }

    // 隐藏加载状态
    function hideLoading() {
      document.getElementById('loadingMask').classList.add('hidden');
    }
  </script>
</body>
</html>
